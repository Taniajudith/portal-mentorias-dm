<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario | Portal de Mentorías</title>

<style>

:root{
    --azul:#003b73;
    --naranja:#f47c20;
    --fondo:#f7f9fc;
}

body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:var(--fondo);
}

header{
    background:white;
    text-align:center;
    padding:25px;
    border-bottom:5px solid var(--naranja);
}

.logo{
    max-width:180px;
    margin-bottom:10px;
}

header h1{
    color:var(--azul);
    margin:0;
    font-size:42px;
}

header p{
    color:var(--naranja);
    font-size:20px;
    font-weight:600;
}

nav{
    background:var(--azul);
    text-align:center;
    padding:14px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 12px;
    font-weight:bold;
}

nav a:hover{
    color:var(--naranja);
}

.container{
    max-width:1300px;
    margin:auto;
    padding:30px;
}

.back{
    display:inline-block;
    background:var(--naranja);
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:10px;
    font-weight:bold;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:18px;
    padding:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

img{
    width:100%;
    height:auto;
    border-radius:12px;
}

footer{
    background:var(--azul);
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
    border-top:5px solid var(--naranja);
}

</style>
</head>

<body>

<header>

<img src="logo-despertar.jpg" class="logo">

<h1>Calendario de Mentorías</h1>
<p>Agosto - Diciembre 2026</p>

</header>

<nav>
    <a href="index.html">Inicio</a>
    <a href="calendario.html">Calendario</a>
</nav>

<div class="container">

<a href="index.html" class="back">
← Volver al Inicio
</a>

<div class="card">
    <img src="calendario-semestre-2026.png" alt="Calendario de Mentorías">
</div>

</div>

<footer>
Educando a través de la música, transformando generaciones.
</footer>

</body>
</html>
